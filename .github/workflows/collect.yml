name: collect

on:
  schedule:
    - cron: '17 */6 * * *'   # 6시간마다 (UTC 기준 00:17, 06:17, 12:17, 18:17)
  workflow_dispatch:          # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 유튜브 데이터 수집
        run: node collect.js
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}

      - name: 수집 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC') 자동 수집"
          git push
